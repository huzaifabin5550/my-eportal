 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ClassPortal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="header-brand">
      <div class="logo-icon">📚</div>
      <span>Class<em>Portal</em></span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="submit.html">Submit</a>
      <a href="login.html" class="active">Login</a>
      <a href="signup.html" class="btn-nav">Sign Up</a>
    </nav>
  </header>

  <div class="auth-wrapper">
    <div class="auth-box fade-up">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Login to access your ClassPortal account</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn btn-primary btn-full" onclick="loginUser()">
        Login to Portal
      </button>

      <div id="error-msg" class="msg msg-error" style="display:none;"></div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one free</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 <span>ClassPortal</span> — Built for Students, Managed by Teachers</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyD2gg4JLsd-Q0vPRYuukZ3oujb6RiR53NE",
      authDomain: "my-e-portal.firebaseapp.com",
      projectId: "my-e-portal",
      storageBucket: "my-e-portal.firebasestorage.app",
      messagingSenderId: "628881859766",
      appId: "1:628881859766:web:e45df5cb372d58960c7217"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.loginUser = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");
      errorMsg.style.display = "none";

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          if (userCredential.user.email === "admin@eportal.com") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";
          }
        })
        .catch(() => {
          errorMsg.textContent = "❌ Invalid email or password. Please try again.";
          errorMsg.style.display = "block";
        });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginUser();
    });
  </script>

</body>
</html>
