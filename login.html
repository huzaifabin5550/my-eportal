 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ClassPortal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .dropdown-hint {
      text-align: center;
      margin-bottom: 28px;
      padding: 14px 20px;
      background: rgba(59,130,246,0.06);
      border: 1px solid rgba(59,130,246,0.15);
      border-radius: 10px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }
    .role-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 28px;
    }
    .role-btn {
      padding: 16px 12px;
      border-radius: 12px;
      border: 2px solid var(--border);
      background: white;
      cursor: pointer;
      text-align: center;
      transition: all 0.25s;
      font-family: 'DM Sans', sans-serif;
    }
    .role-btn .role-icon {
      font-size: 1.8rem;
      display: block;
      margin-bottom: 8px;
    }
    .role-btn .role-label {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--navy);
      display: block;
    }
    .role-btn .role-desc {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 3px;
      display: block;
    }
    .role-btn:hover {
      border-color: var(--blue);
      background: rgba(59,130,246,0.04);
      transform: translateY(-2px);
    }
    .role-btn.selected {
      border-color: var(--blue);
      background: rgba(59,130,246,0.06);
    }
    .role-btn.selected-admin.selected {
      border-color: var(--gold);
      background: rgba(245,158,11,0.06);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="header-brand">
      <div class="logo-icon">📚</div>
      <span>Class<em>Portal</em></span>
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="submit.html">Submit</a>
      <a href="login.html" class="active">Login</a>
      <a href="signup.html" class="btn-nav">Sign Up</a>
    </nav>
  </header>

  <div class="auth-wrapper">
    <div class="auth-box fade-up">
      <div class="auth-header">
        <div class="auth-icon">🔐</div>
        <h2>Welcome Back</h2>
        <p class="subtitle">Select your role and login below</p>
      </div>

      <div class="role-selector">
        <button class="role-btn selected-admin" id="btn-admin" onclick="selectRole('admin')">
          <span class="role-icon">🛡️</span>
          <span class="role-label">Admin</span>
          <span class="role-desc">Teacher / Manager</span>
        </button>
        <button class="role-btn" id="btn-student" onclick="selectRole('student')">
          <span class="role-icon">🎓</span>
          <span class="role-label">Student</span>
          <span class="role-desc">Class member</span>
        </button>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password" />
      </div>

      <button class="btn btn-primary btn-full" onclick="loginUser()">
        Login to Portal
      </button>

      <div id="error-msg" class="msg msg-error" style="display:none;"></div>

      <div class="auth-footer">
        Don't have an account? <a href="signup.html">Create one free</a>
      </div>
    </div>
  </div>

  <footer>
    <p>© 2025 <span>ClassPortal</span> — Built for Students, Managed by Teachers</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyD2gg4JLsd-Q0vPRYuukZ3oujb6RiR53NE",
      authDomain: "my-e-portal.firebaseapp.com",
      projectId: "my-e-portal",
      storageBucket: "my-e-portal.firebasestorage.app",
      messagingSenderId: "628881859766",
      appId: "1:628881859766:web:e45df5cb372d58960c7217"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    let selectedRole = "admin";

    window.selectRole = function(role) {
      selectedRole = role;
      document.getElementById("btn-admin").classList.remove("selected");
      document.getElementById("btn-student").classList.remove("selected");
      if (role === "admin") {
        document.getElementById("btn-admin").classList.add("selected");
        document.getElementById("email").placeholder = "admin@eportal.com";
      } else {
        document.getElementById("btn-student").classList.add("selected");
        document.getElementById("email").placeholder = "student@example.com";
      }
    }

   const urlParams = new URLSearchParams(window.location.search);
const role = urlParams.get("role") || "admin";
selectRole(role);

    window.loginUser = function() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");
      errorMsg.style.display = "none";

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          if (userCredential.user.email === "admin@eportal.com") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "dashboard.html";
          }
        })
        .catch(() => {
          errorMsg.textContent = "❌ Invalid email or password. Please try again.";
          errorMsg.style.display = "block";
        });
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginUser();
    });
  </script>

</body>
</html>
