 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — ClassPortal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="public-header">
    <a href="index.html" class="brand">
      <img src="https://i.postimg.cc/mg0ZNYHh/Whisk-ddc266604d642ee810d42746806c01f1dr-removebg-preview.png" alt="Logo" class="brand-logo" />
    </a>
    <nav class="public-nav">
      <a href="index.html">Home</a>
      <a href="login.html" class="active">Login</a>
      
    </nav>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-icon">🔐</div>
      <h2>Welcome Back</h2>
      <p class="auth-sub">Select your role and login below</p>

      <div class="role-grid">
        <button class="role-card selected-admin" id="btn-admin" onclick="selectRole('admin')">
          <span class="rc-icon">🛡️</span>
          <span class="rc-label">Admin</span>
          <span class="rc-desc">Teacher / Manager</span>
        </button>
        <button class="role-card" id="btn-student" onclick="selectRole('student')">
          <span class="rc-icon">🎓</span>
          <span class="rc-label">Student</span>
          <span class="rc-desc">Class member</span>
        </button>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" />
          <button class="pw-toggle" onclick="togglePw()" id="pwBtn">👁️</button>
        </div>
      </div>

      <div class="remember-row">
        <input type="checkbox" id="rememberMe" />
        <label for="rememberMe">Remember Me — stay logged in after closing browser</label>
      </div>

      <button class="btn btn-primary btn-full" onclick="loginUser()">
        Login to Portal
      </button>

      <div id="error-msg" class="msg msg-error"></div>

      <div class="auth-footer">
        Contact your administrator to create an account.
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2gg4JLsd-Q0vPRYuukZ3oujb6RiR53NE",
      authDomain: "my-e-portal.firebaseapp.com",
      projectId: "my-e-portal",
      storageBucket: "my-e-portal.firebasestorage.app",
      messagingSenderId: "628881859766",
      appId: "1:628881859766:web:e45df5cb372d58960c7217"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        window.location.href = user.email === "admin@eportal.com" ? "admin.html" : "dashboard.html";
      }
    });

    let selectedRole = "admin";
    let showPw = false;

    window.selectRole = function(role) {
      selectedRole = role;
      document.getElementById("btn-admin").classList.remove("selected");
      document.getElementById("btn-student").classList.remove("selected");
      if (role === "admin") {
        document.getElementById("btn-admin").classList.add("selected");
        document.getElementById("email").placeholder = "admin@eportal.com";
      } else {
        document.getElementById("btn-student").classList.add("selected");
        document.getElementById("email").placeholder = "student@example.com";
      }
    }

    window.togglePw = function() {
      showPw = !showPw;
      document.getElementById("password").type = showPw ? "text" : "password";
      document.getElementById("pwBtn").textContent = showPw ? "🙈" : "👁️";
    }

    const urlParams = new URLSearchParams(window.location.search);
    selectRole(urlParams.get("role") || "admin");

    window.loginUser = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const rememberMe = document.getElementById("rememberMe").checked;
      const errorMsg = document.getElementById("error-msg");
      errorMsg.style.display = "none";

      if (!email || !password) {
        errorMsg.textContent = "❌ Please enter your email and password.";
        errorMsg.style.display = "block";
        return;
      }

      try {
        await setPersistence(auth, rememberMe ? browserLocalPersistence : browserSessionPersistence);
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;
        const storage = rememberMe ? localStorage : sessionStorage;
        storage.setItem("cp_uid", user.uid);
        storage.setItem("cp_email", user.email);
        storage.setItem("cp_role", user.email === "admin@eportal.com" ? "admin" : "student");
        window.location.href = user.email === "admin@eportal.com" ? "admin.html" : "dashboard.html";
      } catch (error) {
        errorMsg.textContent = "❌ Invalid email or password. Please try again.";
        errorMsg.style.display = "block";
      }
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Enter") loginUser(); });
  </script>

</body>
</html>
