 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — ClassPortal</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="public-header">
    <a href="index.html" class="brand">
      <img src="https://i.postimg.cc/mg0ZNYHh/Whisk-ddc266604d642ee810d42746806c01f1dr-removebg-preview.png" alt="Logo" class="brand-logo" />
    </a>
    <nav class="public-nav">
      <a href="index.html">Home</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="active btn btn-primary btn-sm">Sign Up</a>
    </nav>
  </header>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-icon">📝</div>
      <h2>Create Account</h2>
      <p class="auth-sub">Join ClassPortal as a student</p>

      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="fullName" placeholder="Your full name" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Student ID / Roll No *</label>
          <input type="text" id="rollNumber" placeholder="e.g. 01" />
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" placeholder="you@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Password * (min 6 characters)</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Create a strong password" />
          <button class="pw-toggle" onclick="togglePw()" id="pwBtn">👁️</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" onclick="signupUser()">
        Create My Account
      </button>

      <div id="error-msg" class="msg msg-error"></div>
      <div id="success-msg" class="msg msg-success"></div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2gg4JLsd-Q0vPRYuukZ3oujb6RiR53NE",
      authDomain: "my-e-portal.firebaseapp.com",
      projectId: "my-e-portal",
      storageBucket: "my-e-portal.firebasestorage.app",
      messagingSenderId: "628881859766",
      appId: "1:628881859766:web:e45df5cb372d58960c7217"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let showPw = false;

    window.togglePw = function() {
      showPw = !showPw;
      document.getElementById("password").type = showPw ? "text" : "password";
      document.getElementById("pwBtn").textContent = showPw ? "🙈" : "👁️";
    }

    window.signupUser = async function() {
      const name = document.getElementById("fullName").value.trim();
      const roll = document.getElementById("rollNumber").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error-msg");
      const successMsg = document.getElementById("success-msg");

      errorMsg.style.display = "none";
      successMsg.style.display = "none";

      if (!name || !roll || !email || !password) {
        errorMsg.textContent = "❌ Please fill in all required fields.";
        errorMsg.style.display = "block";
        return;
      }

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(userCredential.user, { displayName: name });
        await setDoc(doc(db, "users", userCredential.user.uid), {
          fullName: name,
          rollNumber: roll,
          email: email,
          role: "student",
          createdAt: new Date().toISOString()
        });

        successMsg.textContent = "✅ Account created! Redirecting to login...";
        successMsg.style.display = "block";
        setTimeout(() => window.location.href = "login.html", 2000);
      } catch (error) {
        if (error.code === "auth/email-already-in-use") {
          errorMsg.textContent = "❌ This email is already registered.";
        } else if (error.code === "auth/weak-password") {
          errorMsg.textContent = "❌ Password must be at least 6 characters.";
        } else {
          errorMsg.textContent = "❌ Signup failed. Please try again.";
        }
        errorMsg.style.display = "block";
      }
    }

    document.addEventListener("keydown", (e) => { if (e.key === "Enter") signupUser(); });
  </script>

</body>
</html>
