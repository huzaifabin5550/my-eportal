 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Upload Assignment — ClassPortal</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .upload-card {
      background: white;
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html" class="header-brand">
       <div class="logo-icon"><img src="https://i.postimg.cc/3wB5qmcn/Whisk-ddc266604d642ee810d42746806c01f1dr.png" alt="ClassPortal Logo" /></div>
     <span style="display:none;">ClassPortal</span>
    </a>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="upload.html" class="active">Upload</a>
      <a href="status.html">My Status</a>
      <button class="nav-logout" onclick="logoutUser()">Logout</button>
    </nav>
  </header>

  <div class="page-wrapper-sm">

    <div class="section-banner fade-up">
      <div class="s-badge">📤 Assignment Upload</div>
      <h2>Upload Your <span>Assignment</span></h2>
      <p>Fill in all fields, attach your file, and click Upload.</p>
    </div>

    <div class="upload-card fade-up-2">
      <div class="card-title" style="margin-bottom:22px;">📋 Assignment Upload Form</div>

      <div class="form-row">
        <div class="form-group">
          <label>Student Full Name *</label>
          <input type="text" id="studentName" placeholder="Auto-filled" disabled />
        </div>
        <div class="form-group">
          <label>Student ID / Roll Number *</label>
          <input type="text" id="rollNumber" placeholder="Auto-filled" disabled />
        </div>
      </div>

      <div class="form-group">
        <label>Email Address *</label>
        <input type="email" id="email" placeholder="Auto-filled" disabled />
      </div>

      <div class="form-group">
        <label>Course Name *</label>
        <select id="courseName">
          <option value="">-- Select course --</option>
          <option value="gdpr">EU GDPR & Data Security</option>
          <option value="future">Future Proofing your Business</option>
          <option value="investigations">Investigations & Incident Response</option>
          <option value="mobile">Mobile Device & Data Risks</option>
          <option value="network">Network Architecture & Protocols</option>
          <option value="threat">Threat & Risk: Expecting the Unexpected</option>
        </select>
      </div>

      <div class="form-group">
        <label>Assignment Title *</label>
        <input type="text" id="assignmentTitle"
          placeholder="e.g. Assignment 1 — Data Protection Report" />
      </div>

      <div class="form-group">
        <label>Upload File * (PDF, DOCX, PPTX, ZIP — max 50MB)</label>
        <div class="file-drop" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput"
            accept=".pdf,.doc,.docx,.ppt,.pptx,.zip"
            onchange="handleFile()" />
          <div class="fd-icon">📁</div>
          <p><strong>Click to browse</strong> or drag and drop</p>
          <p>PDF, DOCX, PPTX, ZIP accepted — max 50MB</p>
          <div class="file-name" id="fileName"></div>
        </div>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="form-group">
        <label>Description / Notes (optional)</label>
        <textarea id="notes"
          placeholder="Any notes or description for your teacher..."></textarea>
      </div>

      <button class="btn btn-primary btn-full" onclick="uploadAssignment()">
        📤 Upload Assignment
      </button>

      <div id="uploadMsg" class="msg"></div>
    </div>

  </div>

  <footer>
    <p>© 2025 <span>ClassPortal</span> — Assignment Submission System</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyD2gg4JLsd-Q0vPRYuukZ3oujb6RiR53NE",
      authDomain: "my-e-portal.firebaseapp.com",
      projectId: "my-e-portal",
      storageBucket: "my-e-portal.firebasestorage.app",
      messagingSenderId: "628881859766",
      appId: "1:628881859766:web:e45df5cb372d58960c7217"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const ADMIN_EMAIL = "admin@eportal.com";

    let currentUser = null;
    let userData = null;
    let fileData = null;
    let fileName = null;
    let fileType = null;

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      if (user.email === ADMIN_EMAIL) {
        window.location.href = "admin.html";
        return;
      }
      currentUser = user;
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        userData = userDoc.data();
        document.getElementById("studentName").value = userData.fullName || user.displayName || "";
        document.getElementById("rollNumber").value = userData.rollNumber || "";
      } else {
        document.getElementById("studentName").value = user.displayName || "";
      }
      document.getElementById("email").value = user.email;
    });

    window.handleFile = function() {
      const file = document.getElementById("fileInput").files[0];
      if (!file) return;

      const allowed = [".pdf",".doc",".docx",".ppt",".pptx",".zip"];
      const ext = "." + file.name.split(".").pop().toLowerCase();
      if (!allowed.includes(ext)) {
        document.getElementById("fileName").textContent = "❌ Invalid file type.";
        document.getElementById("fileName").style.color = "var(--error)";
        fileData = null;
        return;
      }

      if (file.size > 50 * 1024 * 1024) {
        document.getElementById("fileName").textContent = "❌ File too large. Max 50MB.";
        document.getElementById("fileName").style.color = "var(--error)";
        fileData = null;
        return;
      }

      fileName = file.name;
      fileType = file.type;
      document.getElementById("fileName").textContent = "📎 " + file.name;
      document.getElementById("fileName").style.color = "var(--blue)";

      const reader = new FileReader();
      const progressBar = document.getElementById("progressBar");
      const progressFill = document.getElementById("progressFill");
      progressBar.style.display = "block";

      reader.onprogress = (e) => {
        if (e.lengthComputable) {
          progressFill.style.width = (e.loaded / e.total * 100) + "%";
        }
      };

      reader.onload = (e) => {
        fileData = e.target.result;
        progressFill.style.width = "100%";
      };

      reader.readAsDataURL(file);
    }

    window.uploadAssignment = async function() {
      const course = document.getElementById("courseName").value;
      const title = document.getElementById("assignmentTitle").value.trim();
      const notes = document.getElementById("notes").value.trim();
      const uploadMsg = document.getElementById("uploadMsg");

      uploadMsg.style.display = "none";

      if (!course || !title) {
        uploadMsg.textContent = "❌ Please fill in all required fields.";
        uploadMsg.className = "msg msg-error";
        uploadMsg.style.display = "block";
        return;
      }

      if (!fileData) {
        uploadMsg.textContent = "❌ Please select a file to upload.";
        uploadMsg.className = "msg msg-error";
        uploadMsg.style.display = "block";
        return;
      }

      uploadMsg.textContent = "⏳ Uploading your assignment...";
      uploadMsg.className = "msg msg-info";
      uploadMsg.style.display = "block";

      try {
        await addDoc(collection(db, "assignments"), {
          userId: currentUser.uid,
          studentName: userData?.fullName || currentUser.displayName || "",
          rollNumber: userData?.rollNumber || "",
          email: currentUser.email,
          course: course,
          assignmentTitle: title,
          notes: notes,
          fileName: fileName,
          fileType: fileType,
          fileData: fileData,
          uploadedAt: serverTimestamp()
        });

        // Update tracker
        const trackerRef = doc(db, "tracker", "submissions");
        const trackerSnap = await getDoc(trackerRef);
        let trackerData = trackerSnap.exists() ? trackerSnap.data() : {};
        const sName = userData?.fullName || currentUser.displayName || currentUser.email;
        if (!trackerData[sName]) trackerData[sName] = {};
        trackerData[sName][course] = true;
        await setDoc(trackerRef, trackerData);

        uploadMsg.textContent = "✅ Assignment uploaded successfully! Redirecting...";
        uploadMsg.className = "msg msg-success";

        document.getElementById("courseName").value = "";
        document.getElementById("assignmentTitle").value = "";
        document.getElementById("notes").value = "";
        document.getElementById("fileName").textContent = "";
        document.getElementById("progressBar").style.display = "none";
        document.getElementById("progressFill").style.width = "0%";
        fileData = null;

        setTimeout(() => window.location.href = "status.html", 2000);

      } catch (err) {
        uploadMsg.textContent = "❌ Upload failed. Please try again.";
        uploadMsg.className = "msg msg-error";
        console.error(err);
      }
    }

    window.logoutUser = function() {
      ["cp_uid","cp_email","cp_role","cp_name"].forEach(k => {
        localStorage.removeItem(k);
        sessionStorage.removeItem(k);
      });
      signOut(auth).then(() => window.location.href = "login.html");
    }
  </script>

</body>
</html>
